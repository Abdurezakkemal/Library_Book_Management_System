<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Library Management</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">📚 Library System</div>
            <ul class="nav-menu">
                <li><a href="/books">Books</a></li>
                <li><a href="/features">Features</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="page-header">
            <h1>Contact Us</h1>
            <p>We'd love to hear from you</p>
        </section>

        <section class="contact-content">
            <div class="contact-info">
                <div class="info-card">
                    <div class="info-icon">📧</div>
                    <h3>Email</h3>
                    <p>abdrezakkemal@gmail.com</p>
                </div>

                <div class="info-card">
                    <div class="info-icon">📞</div>
                    <h3>Phone</h3>
                    <p>+251 945911049</p>
                </div>

                <div class="info-card">
                    <div class="info-icon">📍</div>
                    <h3>Address</h3>
                    <p>kilinto<br>AASTU building</p>
                </div>
            </div>

            <div class="contact-form-section">
                <h2>Send us a message</h2>
                <form class="contact-form" onsubmit="handleContactSubmit(event)">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
                <div id="contactMessage" class="contact-message"></div>
            </div>
        </section>
    </main>

    <script>
        function handleContactSubmit(e) {
            e.preventDefault();
            const messageDiv = document.getElementById('contactMessage');
            messageDiv.textContent = 'Thank you for your message! We will get back to you soon.';
            messageDiv.style.display = 'block';
            e.target.reset();
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>

</html>
